name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: make build

      - name: Test
        run: make test

      - name: Bundle
        run: make bundle

      - name: Verify app structure
        run: |
          test -f "ClaudeBar.app/Contents/MacOS/claude-bar"
          test -f "ClaudeBar.app/Contents/Info.plist"
